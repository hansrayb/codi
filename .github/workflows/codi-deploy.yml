name: Codi Deploy

on:
  workflow_run:
    workflows:
      - Codi CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: codi-deploy
  cancel-in-progress: false

jobs:
  deploy-center:
    name: Deploy Codi center
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: >
      vars.CODI_DEPLOY_ENABLED == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event.workflow_run.conclusion == 'success' &&
          github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == 'main'
        )
      )

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          APP_DIR: ${{ secrets.CODI_APP_DIR }}
          SERVICE_NAME: ${{ secrets.CODI_SERVICE_NAME }}
        with:
          host: ${{ secrets.CODI_DEPLOY_HOST }}
          username: ${{ secrets.CODI_DEPLOY_USER }}
          key: ${{ secrets.CODI_DEPLOY_SSH_KEY }}
          port: ${{ secrets.CODI_DEPLOY_PORT || 22 }}
          envs: APP_DIR,SERVICE_NAME
          script_stop: true
          script: |
            set -eu
            cd "$APP_DIR"
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            .venv/bin/python -m pip install -r backend/requirements.txt
            (cd backend && "$APP_DIR/.venv/bin/python" -m compileall config.py main.py handlers core models utils tests agent)
            (cd backend && "$APP_DIR/.venv/bin/python" -m unittest discover -s tests -v)
            systemctl --user restart "$SERVICE_NAME"
            systemctl --user --no-pager status "$SERVICE_NAME"
            API_TOKEN=$(grep -E '^DEVICE_API_SHARED_TOKEN=' "$APP_DIR/.env" | tail -1 | cut -d= -f2- | tr -d '"' | tr -d "'")
            API_PORT=$(grep -E '^DEVICE_API_PORT=' "$APP_DIR/.env" | tail -1 | cut -d= -f2- | tr -d '"' | tr -d "'" || echo "8787")
            API_PORT="${API_PORT:-8787}"
            if [[ -n "$API_TOKEN" ]]; then
              curl -sf -X POST "http://127.0.0.1:${API_PORT}/api/device/tasks/enqueue" \
                -H "Authorization: Bearer $API_TOKEN" \
                -H "Content-Type: application/json" \
                -d '{"device_id":"all","kind":"self_update","payload":{}}' \
                && echo "[deploy] self_update task dikirim ke semua agent" \
                || echo "[deploy] tidak ada agent aktif atau API belum siap, skip"
            fi
