name: Codi CI

on:
  push:
    branches:
      - main
      - master
      - develop
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "codi-alert-targets.json"
  pull_request:
    paths:
      - ".github/workflows/**"
      - "backend/**"
      - "codi-alert-targets.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Compile and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: python -m pip install -r requirements.txt

      - name: Compile Python files
        working-directory: backend
        run: python -m compileall config.py main.py handlers core models utils tests agent

      - name: Run unit tests
        working-directory: backend
        run: python -m unittest discover -s tests -v

